name: Build Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install pyinstaller seleniumbase google-api-python-client google-auth

      - name: Build estate scanner exe
        run: pyinstaller --onefile --name estate-scanner --distpath electron/bin scripts/estate-scanner.py

      - name: Build Next.js
        run: npm run build

      - name: Build Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install pyinstaller seleniumbase google-api-python-client google-auth

      - name: Build estate scanner binary
        run: pyinstaller --onefile --name estate-scanner --distpath electron/bin scripts/estate-scanner.py

      - name: Build Next.js
        run: npm run build

      - name: Build Electron (Mac)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-electron/*.dmg
