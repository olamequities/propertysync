<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropScope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: transparent;
      -webkit-app-region: drag;
      user-select: none;
    }
    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    h1 {
      color: #e0e0e0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .sub {
      color: #8888aa;
      font-size: 13px;
      margin-bottom: 20px;
      min-height: 18px;
    }
    .bar-wrap {
      width: 220px;
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      margin: 14px auto 0;
      overflow: hidden;
      display: none;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: #6c63ff;
      transition: width 0.2s ease;
    }
    .version {
      color: #5a5a7a;
      font-size: 11px;
      margin-top: 16px;
      letter-spacing: 0.5px;
    }
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a4a;
      border-top-color: #6c63ff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>PropScope</h1>
    <p class="sub" id="status">Loading&hellip;</p>
    <div class="loader"></div>
    <div class="bar-wrap" id="barWrap"><div class="bar" id="bar"></div></div>
    <p class="version" id="version"></p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const v = params.get("v");
    if (v) document.getElementById("version").textContent = "v" + v;
    window.__setStatus = function (text, percent) {
      const s = document.getElementById("status");
      const wrap = document.getElementById("barWrap");
      const bar = document.getElementById("bar");
      if (text != null) s.textContent = text;
      if (typeof percent === "number") {
        wrap.style.display = "block";
        bar.style.width = Math.max(0, Math.min(100, percent)) + "%";
      } else {
        wrap.style.display = "none";
      }
    };
  </script>
</body>
</html>
