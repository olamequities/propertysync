<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: drag;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 360px;
      height: 240px;
      background: #0747a6;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 32px rgba(7, 71, 166, 0.35),
        0 2px 8px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Subtle grid pattern overlay */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* Accent glow at top */
    .card::after {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 120px;
      background: radial-gradient(ellipse, rgba(0, 101, 255, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both 0.2s;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      opacity: 0.9;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: 19px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .brand-sub {
      font-size: 10.5px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .loader-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.5s ease both 0.4s;
    }

    .loader {
      display: flex;
      gap: 5px;
    }

    .loader-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.15s; }
    .loader-dot:nth-child(3) { animation-delay: 0.3s; }

    .status {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3px;
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 0.3px;
      z-index: 1;
      animation: fadeUp 0.5s ease both 0.6s;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(6px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 80%, 100% {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1);
      }
      40% {
        background: rgba(255, 255, 255, 0.7);
        transform: scale(1.3);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Olam PropertySync</span>
          <span class="brand-sub">NYC Property Data</span>
        </div>
      </div>

      <div class="loader-group">
        <div class="loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <span class="status">Starting up&hellip;</span>
      </div>
    </div>

    <span class="version">v1.1.0</span>
  </div>
</body>
</html>
